services:
  - type: web
    name: ori-whatsapp-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python src/server.py
    healthCheckPath: /health
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GRAPH_API_VERSION
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: META_APP_ID
        sync: false
      - key: DRY_RUN
        sync: false
      - key: USE_OPENAI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_TIMEOUT
        sync: false
